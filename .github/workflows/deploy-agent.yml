name: Deploy Agent
on:
    workflow_dispatch:
        inputs:
            agent_name:
                description: "Agent directory name under agents/ (e.g. maritime_briefer)"
                required: true

permissions:
    contents: read
    id-token: write

jobs:
    deploy:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Read config from broadchurch.yaml
              id: config
              run: |
                  echo "project=$(yq -r '.gcp.project' broadchurch.yaml)" >> "$GITHUB_OUTPUT"
                  echo "region=$(yq -r '.gcp.region' broadchurch.yaml)" >> "$GITHUB_OUTPUT"
                  echo "project_name=$(yq -r '.tenant.project_name' broadchurch.yaml)" >> "$GITHUB_OUTPUT"
                  echo "org_id=$(yq -r '.tenant.org_id' broadchurch.yaml)" >> "$GITHUB_OUTPUT"
                  echo "service_account=$(yq -r '.tenant.service_account' broadchurch.yaml)" >> "$GITHUB_OUTPUT"
                  echo "gateway_url=$(yq -r '.gateway.url' broadchurch.yaml)" >> "$GITHUB_OUTPUT"

            - name: Validate agent directory
              run: |
                  AGENT_DIR="agents/${{ inputs.agent_name }}"
                  if [ ! -f "${AGENT_DIR}/agent.py" ]; then
                    echo "::error::Agent directory ${AGENT_DIR} does not contain agent.py"
                    exit 1
                  fi
                  if ! grep -q "root_agent" "${AGENT_DIR}/agent.py"; then
                    echo "::error::agent.py does not export root_agent"
                    exit 1
                  fi

            - uses: actions/setup-python@v5
              with:
                  python-version: "3.12"

            - name: Install ADK
              run: pip install google-adk google-cloud-aiplatform

            - uses: google-github-actions/auth@v2
              with:
                  workload_identity_provider: "projects/194773164895/locations/global/workloadIdentityPools/github-actions/providers/github"
                  service_account: "github-deploy@broadchurch.iam.gserviceaccount.com"

            - uses: google-github-actions/setup-gcloud@v2

            - name: Discover MCP server URLs
              id: mcp
              run: |
                  GATEWAY="${{ steps.config.outputs.gateway_url }}"
                  ORG_ID="${{ steps.config.outputs.org_id }}"
                  MCP_URL=""
                  if [ -n "${GATEWAY}" ] && [ -n "${ORG_ID}" ]; then
                    MCP_URL=$(curl -sf "${GATEWAY}/api/config/${ORG_ID}" 2>/dev/null \
                      | jq -r '.mcp_servers[0].url // empty' 2>/dev/null || true)
                  fi
                  echo "mcp_server_url=${MCP_URL}" >> "$GITHUB_OUTPUT"
                  if [ -n "${MCP_URL}" ]; then
                    echo "Found MCP server: ${MCP_URL}"
                  else
                    echo "No MCP servers found (agent will deploy without MCP tools)"
                  fi

            - name: Deploy to Agent Engine
              id: deploy
              env:
                  MCP_SERVER_URL: ${{ steps.mcp.outputs.mcp_server_url }}
              run: |
                  DISPLAY_NAME="${{ steps.config.outputs.project_name }}--${{ inputs.agent_name }}"
                  echo "display_name=${DISPLAY_NAME}" >> "$GITHUB_OUTPUT"

                  OUTPUT=$(adk deploy agent_engine \
                    --project "${{ steps.config.outputs.project }}" \
                    --region "${{ steps.config.outputs.region }}" \
                    --display_name "${DISPLAY_NAME}" \
                    --trace_to_cloud \
                    "agents/${{ inputs.agent_name }}/" 2>&1) || {
                    echo "::error::ADK deploy failed"
                    echo "$OUTPUT"
                    exit 1
                  }

                  echo "$OUTPUT"
                  RESOURCE=$(echo "$OUTPUT" | grep -oP 'projects/\d+/locations/[^/]+/reasoningEngines/\d+' | tail -1)
                  if [ -z "$RESOURCE" ]; then
                    echo "::error::Could not extract resource ID from deploy output"
                    exit 1
                  fi
                  echo "resource_id=${RESOURCE}" >> "$GITHUB_OUTPUT"
                  echo "Deployed: ${RESOURCE}"

            - name: Register with Portal
              run: |
                  GATEWAY="${{ steps.config.outputs.gateway_url }}"
                  ORG_ID="${{ steps.config.outputs.org_id }}"
                  RESOURCE="${{ steps.deploy.outputs.resource_id }}"
                  DISPLAY_NAME="${{ steps.deploy.outputs.display_name }}"
                  AGENT_NAME="${{ inputs.agent_name }}"

                  curl -sf -X POST "${GATEWAY}/api/agents/${ORG_ID}" \
                    -H "Content-Type: application/json" \
                    -d "{
                      \"resource_id\": \"${RESOURCE}\",
                      \"display_name\": \"${DISPLAY_NAME}\",
                      \"agent_name\": \"${AGENT_NAME}\",
                      \"deployed_by\": \"github-actions\"
                    }"

                  echo "Registered ${AGENT_NAME} with Portal gateway"
